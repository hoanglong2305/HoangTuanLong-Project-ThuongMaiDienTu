<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>Đăng ký tài khoản</h1>
        <p class="subtitle">Đăng ký tài khoản để sử dụng dịch vụ</p>

        <form class="registration-form">
            <div class="row">
                <div class="input_field_base">
                    <label>Họ và tên đệm</label>
                    <input type="text">
                </div>
                <div class="input_field_base">
                    <label>Tên</label>
                    <input type="text">
                </div>
            </div>

            <div class="input_field_base">
                <label>Email</label>
                <input type="email" placeholder="you@company.com">
            </div>

            <div class="input_field_base">
                <label>Mật khẩu</label>
                <input type="password">
            </div>

            <div class="input_field_base">
                <label>Xác nhận mật khẩu</label>
                <input type="password">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">Bạn đồng ý với <a href="#">chính sách và điều khoản</a></label>
            </div>

            <button type="submit" class="btn">Đăng ký</button>
        </form>

        <p class="login-footer">Bạn đã có tài khoản? <a href="./register.html">Đăng nhập</a></p>
    </div>
</body>

</html>
